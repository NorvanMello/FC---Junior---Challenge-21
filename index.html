<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Advice generator app</title>

</head>
<body>

  <main class="main-card">
    <div class="container">
      <div class="text-container" aria-live="polite" aria-atomic="true">
        <h1 class="title-text">ADVICE #117</h1>
        <p class="advice-text"> “It is easy to sit up and take notice, what's difficult is getting up and taking action.”</p>
      </div>
    
      <div class="divider-container">
        <img src="./images/pattern-divider-mobile.svg" alt="">
      </div>

      <button class="button-container" aria-label="Generate new advice">
        <img src="./images/icon-dice.svg" alt="">
      </button>
    </div>
  </main>
  <script src="./script.js"></script>
</body>
</html>
